syntax = "proto3";

package alis.build;

import "google/longrunning/operations.proto";

import "google/protobuf/field_mask.proto";

import "google/protobuf/timestamp.proto";

option go_package = "github.com/alis-exchange/build-go/alis/build";

// An BuildSpec resource
message BuildSpec {
  // The resource name of the build_spec.
  //
  // This should follow AIP-122(https://google.aip.dev/122) resource name
  // format.
  string name = 1;

  // The display name of the BuildSpec.
  string display_name = 2;

  // Status of the BuildSpec
  Status status = 3;

  // A summary of the BuildSpec
  string summary = 4;

  // Structured content generated by a spec-driven workflow.
  Content content = 5;

  // The Products in which the BuildSpec is implemented in.
  // Example: ["organisations/play/products/ic", ...]
  repeated string products = 6;

  // The Account that owns the BuildSpec
  //
  // Format: accounts/*
  //
  // There are a few scenarios we are accommodating for,
  // including (but not limited to):
  // - Internal BuildSpec in which the work is simply implemented
  // - BuildSpec for a client where the BuildSpec owner account is the same as
  //   the Vendor account (see billing.proto)
  // - BuildSpec for a client where the BuildSpec owner differs from the vendor,
  //   eg. Inovar is the owner that has relationship with the client, but
  //   Kubuni Tech implements the BuildSpec (vendor)
  string account = 7;

  // BuildSpec modules enabled for the BuildSpec.
  repeated Extension extensions_enabled = 8;

  // The Neurons relevant to the BuildSpec
  // Example: ["organisations/play/products/ic/neurons/myservice-v1", ...]
  repeated string neurons = 9;

  // Entity tag
  string etag = 97;

  // When this build_spec was created.
  google.protobuf.Timestamp create_time = 98;

  // When this build_spec was updated.
  google.protobuf.Timestamp update_time = 99;

  // When this build_spec was deleted, if applicable.
  google.protobuf.Timestamp delete_time = 100;

  // The main content of the BuildSpec.
  message Content {
    // The high-level user journey and desired outcomes.
    // This initial phase focuses on defining the user-centric requirements and
    // goals of the software or feature.
    // * Focus: High-level description of the desired product, user journeys,
    // experiences, and business outcomes. It answers the questions: What are we
    // building? Why are we building it?
    // * Artifact: A detailed Specification Document (the "Spec"). This document
    // captures functional and non-functional requirements, detailed feature
    // breakdowns, and precise acceptance criteria.
    // * Action: The development team (often with the aid of an AI agent) drafts
    // and refines this spec, ensuring clarity, completeness, and a focus on the
    // desired behavior of the system.
    Specify specify = 1;

    // In this phase, the abstract specification is translated into a concrete
    // technical implementation plan.
    // * Focus: Architectural decisions, technology choices, system constraints,
    // and data models. It answers the question: How will we build it?
    // * Artifact: A comprehensive Technical Plan (or Design Document). This
    // includes proposed architecture (e.g., microservices), API endpoints,
    // database schemas, and a list of required technologies or frameworks.
    // * Action: Technical leads or AI agents analyze the specification to
    // generate a plan, which is then reviewed and approved by the team to
    // ensure it's feasible and aligns with organizational standards.
    Plan plan = 2;

    // The detailed plan is decomposed into small, manageable, and independently
    // testable units of work.
    // * Focus: Creating an actionable roadmap for implementation.
    // * Artifact: A Task List (or tasks file). Each task is concrete, minimal,
    // and links back to a specific requirement in the original specification.
    // * Action: The plan is broken down into specific tasks, replacing vague
    // directives like "build authentication" with clear steps like "create a
    // user registration endpoint that validates email format." This step is
    // crucial for implementation by both human and AI developers.
    Tasks tasks = 3;

    message Plan {
      // The markdown
      string markdown = 1;
    }

    message Specify {
      // The markdown
      string markdown = 1;
    }

    message Tasks {
      // The markdown
      string markdown = 1;
    }
  }

  // Available Modules
  enum Extension {
    // Not specified
    EXTENSION_UNSPECIFIED = 0;

    // Billing
    EXTENSION_BILLING = 1;

    // Proposal
    EXTENSION_PROPOSAL = 2;

    // Alis Ideate
    EXTENSION_IDEATE = 3;

    // Wireframe
    EXTENSION_WIREFRAME = 4;

    // Timesheet
    EXTENSION_TIMESHEET = 5;

    // FileSet
    EXTENSION_FILE_SET = 6;

    // Github issues
    EXTENSION_GITHUB = 7;
  }

  // Available BuildSpec states.
  enum Status {
    // State not specified
    STATE_UNSPECIFIED = 0;

    // A new BuildSpec and yet to be allocated to work on.
    NEW = 1;

    // BuildSpec is in active state
    ACTIVE = 2;

    // The BuildSpec was completed and accepted by the client.
    COMPLETED = 3;
  }
}

// Request to get an build_spec.
message GetBuildSpecRequest {
  // The resource name of the build_spec to retrieve.
  string name = 1;

  // The view of the build_spec to return.
  //
  // An optional view to specify which fields to return in cases where read_mask
  // is not specified. Defaults to BASIC view.
  BuildSpecView view = 2;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 3;
}

// Request to list buildSpecs.
message ListBuildSpecsRequest {
  // The maximum number of buildSpecs to return.
  int32 page_size = 2;

  // A page token to retrieve the next page of results.
  string page_token = 3;

  // The view of buildSpecs to return.
  //
  // An optional view to specify which fields to return in cases where read_mask
  // is not specified. Defaults to BASIC view.
  BuildSpecView view = 4;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 5;

  // A filter expression to apply to the list of buildSpecs.
  string filter = 6;

  // The field to order the buildSpecs by.
  string order_by = 7;

  // Whether to include deleted buildSpecs in the list.
  bool show_deleted = 8;

  reserved 1;
}

// Response for ListBuildSpecs.
message ListBuildSpecsResponse {
  // The list of buildSpecs.
  repeated BuildSpec build_specs = 1;

  // A token to retrieve the next page of results.
  string next_page_token = 2;
}

message RetrieveMyWorkstationMetadata {
}

message RetrieveMyWorkstationRequest {
  // The two-letter country code in which to provision the workstation
  // The country (or region) associated with the client's IP address.
  // This is a Unicode CLDR region code, such as US or FR. (For most countries,
  // these codes correspond directly to ISO-3166-2 codes:
  // https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2 Currently supported: EU
  // and ZA
  string country_code = 1;
}

message RetrieveMyWorkstationResponse {
  // The uri to the user's web workstation.
  string uri = 1;
}

// View enumeration for BuildSpec.
//
// This enumeration defines the different views that can be used to
// read/retrieve BuildSpec. It works in conjunction with read_mask, where if
// read_mask is not specified, view is used to determine which fields are
// returned. It follows the AIP-157(https://google.aip.dev/157) guidelines for
// partial responses.
enum BuildSpecView {
  // The default / unset value.
  //
  // The API will default to the BASIC view
  BUILD_SPEC_VIEW_UNSPECIFIED = 0;

  // Basic view, includes only essential fields.
  //
  // The API determines which fields are essential.
  // In most cases, this will only include the resource name and etag.
  BUILD_SPEC_VIEW_BASIC = 1;

  // Detailed view, includes all fields except sensitive information.
  BUILD_SPEC_VIEW_FULL = 2;
}

// Public-facing API surface for Alis Build
service BuildService {
  // Returns a build spec
  rpc GetBuildSpec ( GetBuildSpecRequest ) returns ( BuildSpec );

  // Retrieves the status of a workstation operation, e.g. for a RetrieveMyWorkstation request.
  rpc GetWorkstationOperation ( google.longrunning.GetOperationRequest ) returns ( google.longrunning.Operation );

  // Lists build specs
  rpc ListBuildSpecs ( ListBuildSpecsRequest ) returns ( ListBuildSpecsResponse );

  // RetrieveMyWorkstation returns the relevant workstation beloning to the
  // caller. If a workstation does not exist, it will provision one and then
  // return with the one closest to the client.
  rpc RetrieveMyWorkstation ( RetrieveMyWorkstationRequest ) returns ( google.longrunning.Operation );
}
